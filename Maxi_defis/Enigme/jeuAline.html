<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jeu d'énigmes</title>
    <link rel="stylesheet" href="jeuAline.css">
</head>
<body>
    <div class="game-container">
        <h1>Jeu d'énigmes</h1>

        <div id="game">
            <p id="timer">Temps : 0 s</p>
            <p id="question"></p>

            <input type="text" id="answer" placeholder="Votre réponse">
            <button onclick="checkAnswer()">Valider</button>
        </div>

        <div id="result" class="hidden"></div>
    </div>
        <!-- Modale d'authentification -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <h2>Authentification requise</h2>
            <p>Votre score : <span id="final-score"></span></p>
            <div id="lost-info"></div>
            <form id="auth-form">
                <label for="pseudo">Pseudo :</label>
                <input type="text" id="pseudo" required>
                <br>
                <button type="submit">Valider</button>
            </form>
            <button id="rejouer-btn" type="button" style="display:none; margin-top: 20px;">
                Rejouer
            </button>
            <button id="retour-menu-modal" type="button" style="display:none; margin-top: 20px;">
                Retour au menu
            </button>
        </div>
    </div>

    <script src="scriptJeuAline.js"></script>
</body>
</html>
