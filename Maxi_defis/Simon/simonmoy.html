<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Simon moyen</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <header>
        <h1>Jeu de Simon de niveau moyen</h1>
    </header>
    <div class="jeu-container">
        <div class="jeu_simon">
            <div id="vert-fonce" class="couleur vert-fonce"></div>
            <div id="rose" class="couleur rose"></div>
            <div id="blanc" class="couleur blanc"></div>
            <div id="bleu-ciel" class="couleur bleu-ciel"></div>
            <div id="orange" class="couleur orange"></div>
            <div id="violet" class="couleur violet"></div>
        </div>
    </div>
    <button id="commencer"><img src="images/start1.png" alt="Start"></button>
    <div class="bonFaux">
        <h2 id="niveau">Niveau: 0</h2>
        <div id="checkVert" class="rougeVert checkVert"></div>
    </div>
    <div id="popup" class="popup">
        <div class="popup-content">
            <span id="closePopup" class="close">&times;</span>
            <p id="popupMessage"></p>
        </div>
    </div>
        <div id="auth-modal" class="auth-modal" style="display: none;">
        <div class="auth-modal-content">
            <h2>Authentification requise</h2>
            <form id="auth-form">
                <label for="pseudo-auth">Pseudo :</label>
                <input type="text" id="pseudo-auth" required>
                <br>
                <button type="submit">Valider</button>
            </form>
            <div id="lost-info" style="display:none; margin-top: 20px; text-align: left;"></div>
            <button id="rejouer-auth-btn" type="button" style="display:none; margin-top: 20px;">
                Rejouer
            </button>
            <button id="retour-menu-auth-btn" type="button" style="display:none; margin-top: 10px;">
                Retour au menu
            </button>
            <button id="retour-home-auth-btn" type="button" style="display:none; margin-top: 10px;">
                Retour à l'accueil
            </button>
        </div>
    </div>
    <div>
        <button id="retour" onclick="goBackHome()">
            Retour à la page d'accueil
        </button>
    </div>
</body>
<script>
function goBackHome() {
    window.location.href = 'pagedebut.html';
}
</script>
<script src="pagedebut.js"></script>
<script src="script3.js"></script>
</html>
