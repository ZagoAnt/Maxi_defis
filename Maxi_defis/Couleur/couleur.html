<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couleurs</title>
    <link rel="stylesheet" href="couleur.css">
</head>
<body>
    <div class="game-container">
        <h2>Couleurs</h2>
        <p>Clique sur la couleur écrite dans sa bonne couleur le plus rapidement possible!</p>
        
        <div class="score">Score: <span id="score">0</span></div>
        
        <div class="colors-grid" id="colorsGrid">
            <!-- Les couleurs seront générées par JavaScript -->
        </div>
        
        <div class="message" id="message"></div>

        <h3 id="timer-container">Temps restant : <span id="timer">10</span>s</h3>
        
    </div>
    <!-- Modale d'authentification -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <h2>Authentification requise</h2>
            <p>Votre score : <span id="final-score"></span></p>
            <form id="auth-form">
                <label for="pseudo">Pseudo :</label>
                <input type="text" id="pseudo" required>
                <br>
                <button type="submit">Valider</button>
            </form>
            <button id="rejouer-btn" type="button" style="display:none; margin-top: 20px;">
                Rejouer
            </button>
            <button id="retour-menu-modal" type="button" style="display:none; margin-top: 20px;">
                Retour au menu
            </button>
        </div>
    </div>

    <script src="couleur.js"></script>
</body>
</html>
