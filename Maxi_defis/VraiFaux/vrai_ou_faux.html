<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrai ou Faux</title>
    <link rel="stylesheet" href="vrai_ou_faux.css">
</head>

<body>
    <div class="game-container">
        <h1>Vrai ou Faux</h1>
        <h2>La question est la suivante.</h2>

        <p id="question"></p>

        <button class="rep" onclick="repondre(true)">Vrai</button>
        <button class="rep" onclick="repondre(false)">Faux</button>

        <br><br>

        <button id="btnQuestion" onclick="startGame()" style="display:none;">
            Rejouer
        </button>

        <h3 id="timer-container">Temps restant : <span id="timer">10</span>s</h3>

        <p id="resultat"></p>
    </div>

    <!-- Modale d'authentification -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <h2>Authentification requise</h2>
            <p>Votre score : <span id="final-score"></span></p>
            <form id="auth-form">
                <label for="pseudo">Pseudo :</label>
                <input type="text" id="pseudo" required>
                <br>
                <button type="submit">Valider</button>
            </form>
            <button id="rejouer-btn" type="button" onclick="startGame()" style="display:none; margin-top: 20px;">
                Rejouer
            </button>
            <button id="retour-menu-modal" type="button" onclick="window.location.href='../menu.html'" style="display:none; margin-top: 20px;">
                Retour au menu
            </button>
        </div>
    </div>

    <script src="vrai_ou_faux.js"></script>
</body>
</html>
